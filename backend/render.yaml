services:
  - type: web
    name: object-detection-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: UPLOAD_DIR
        value: ./data/uploads
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: BAIDU_API_KEY
        sync: false
      - key: BAIDU_SECRET_KEY
        sync: false
      - key: BAIDU_TOKEN_URL
        value: https://aip.baidubce.com/oauth/2.0/token
      - key: BAIDU_DETECT_URL
        value: https://aip.baidubce.com/rest/2.0/image-classify/v2/advanced_general
      - key: BAIDU_API_TIMEOUT_SECONDS
        value: "30"
      - key: MAX_IMAGE_SIZE_MB
        value: "10"
      - key: ALLOWED_ORIGINS
        value: "https://你的Vercel域名.vercel.app,http://localhost:5173"
    disk:
      name: data-disk
      mountPath: /opt/render/project/src/data
      sizeGB: 1
